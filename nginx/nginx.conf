events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8000;
    }

    # Rate limiting zone para el webhook de WhatsApp
    limit_req_zone $binary_remote_addr zone=whatsapp_webhook:10m rate=30r/m;

    server {
        listen 80;
        server_name _;

        # Redirigir HTTP a HTTPS en produccion
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        location /api/v1/webhooks/whatsapp {
            limit_req zone=whatsapp_webhook burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # server {
